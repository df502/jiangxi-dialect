    <style>
        * {

        .nav {

        }

            border-radius: 4px;
            transition: all 0.2s;
        }
        .nav-btn:hover {
            background-color: #c83030;

        }
        .cover {

        }
        .cover img {

        }
        .cover-title {
            font-size: 40px;
            color: #222;

        }
        .cover-subtitle {

            color: #666;

        .next-btn {
            background-color: #c83030;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .next-btn:hover {
            background-color: #a82e2e;
            transform: translateY(-2px);
        }
body {
    background-image: radial-gradient(#d4c9a3 1px, transparent 1px);
    background-size: 24px 24px;
}

/* 2. 封面图片增加叠加边框和光效 */
.cover img {
    border: 2px solid #e6d5b3;
    transition: transform 0.3s ease;
}
.cover img:hover {
    transform: scale(1.01);
}

.word-card, .saying-card {
    position: relative;
    transition: all 0.25s ease;
    box-shadow: 0 4px 8px rgba(0,0,0,0.05);
}
.word-card:hover, .saying-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 20px rgba(0,0,0,0.1);
    background: #fff8eb;
}
.word-card .word-title::before {
    content: "🗣️ ";
    font-size: 1.1em;
}


.nav-btn {
    background: linear-gradient(to bottom, #fff0e0, #f0e2c6);
    border: none;
    font-weight: 500;
}
.nav-btn:hover {
    background: linear-gradient(to bottom, #c83030, #a52a2a);
}
