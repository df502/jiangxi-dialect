        <div class="divider"></div>
        <p>九江地处江西北部，长江与鄱阳湖交汇处。由于地理位置特殊，九江方言在江西方言中独树一帜——市区方言属江淮官话黄孝片，而下辖的修水、武宁等地则说赣语。本图鉴主要参考九江市区发音人的口述资料，并查阅《九江方言志》等文献整理而成。这里记录的词汇、谚语和民俗，反映的是老九江人的日常语言。</p>
